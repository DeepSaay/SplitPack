var AVATARS=[':)',':D','B)',':|',':P','^^','o0','>>','<<','~o','0o','Oo','OO','^^','--'];

function uid(){return Math.random().toString(36).slice(2,9);}
function fmt(n){return 'Rs.'+Number(n).toFixed(2);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function cover(n){return COVERS[(n?n.charCodeAt(0):65)%COVERS.length];}

function saveIds(ids){localStorage.setItem('sp_ids',JSON.stringify(ids));}
function addId(id){var ids=getIds();if(ids.indexOf(id)===-1){ids.unshift(id);saveIds(ids);}}
function rmId(id){saveIds(getIds().filter(function(x){return x!==id;}));}
function tRef(id){return doc(db,'trips',id);}
function cRef(c){return doc(db,'codes',c.toLowerCase());}
async function dbSave(trip){await setDoc(tRef(trip.id),trip);await setDoc(cRef(sc(trip.id)),{tripId:trip.id});}
async function dbJoin(code){
  var s=await getDoc(cRef(code.trim().toLowerCase()));
  if(!s.exists())return null;
  var ts=await getDoc(tRef(s.data().tripId));
  return ts.exists()?ts.data():null;
}
function shareCount(e,people){
  var raw=(e.rawParticipants&&e.rawParticipants.length>0)?e.rawParticipants:(e.participants||[]);
  var cnt={};
  raw.forEach(function(pid){
    var p=people.find(function(x){return x.id===pid;});
    if(!p){cnt[pid]=(cnt[pid]||0)+1;return;}
    var aid=(p.isDependent&&p.guardianId)?p.guardianId:p.id;
    cnt[aid]=(cnt[aid]||0)+1;
  });
  return cnt;
}
function adultShare(e,adultId,people){
  if(e.splitMode==='custom')return(e.customShares&&e.customShares[adultId])||0;
  var cnt=shareCount(e,people);
  var total=Object.values(cnt).reduce(function(s,n){return s+n;},0);
  if(!total)return 0;
  return(e.amount/total)*((cnt[adultId])||0);
}
function settle(adults,expenses,people){
  var bal={};
  adults.forEach(function(p){bal[p.id]=0;});
  expenses.forEach(function(e){
    bal[e.payerId]=(bal[e.payerId]||0)+e.amount;
    adults.forEach(function(p){bal[p.id]=(bal[p.id]||0)-adultShare(e,p.id,people);});
  });
  var pos=[],neg=[];
  Object.entries(bal).forEach(function(entry){
    var id=entry[0],a=entry[1];
    if(a>0.005)pos.push({id:id,a:a});
    else if(a<-0.005)neg.push({id:id,a:-a});
  });
  var txns=[],i=0,j=0;
  while(i<pos.length&&j<neg.length){
    var s=Math.min(pos[i].a,neg[j].a);
    txns.push({from:neg[j].id,to:pos[i].id,amount:s});
    pos[i].a-=s;neg[j].a-=s;
    if(pos[i].a<0.005)i++;
    if(neg[j].a<0.005)j++;
  }
  return{bal:bal,txns:txns};
}
function exportReceipt(trip){
  var L=t();
  var adults=trip.people.filter(function(p){return !p.isDependent;});
  var result=settle(adults,trip.expenses||[],trip.people);
  var bal=result.bal,txns=result.txns;
  var total=(trip.expenses||[]).reduce(function(s,e){return s+e.amount;},0);
  function pName(id){var p=trip.people.find(function(p){return p.id===id;});return p?p.name:'?';}
  var date=new Date(trip.createdAt).toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'});

  rows+='<tr><td style="padding:6px 8px;font-size:14px;color:#333">Date</td><td style="padding:6px 8px;text-align:right;font-weight:700;font-size:14px;color:#111">'+date+'</td></tr>';
  rows+='<tr><td style="padding:6px 8px;font-size:14px;color:#333">Code</td><td style="padding:6px 8px;text-align:right;font-weight:700;font-size:14px;color:#111">'+sc(trip.id)+'</td></tr>';
  rows+='<tr><td colspan="2"><hr style="border:none;border-top:1px dashed #ccc;margin:4px 0"/></td></tr>';
  rows+='<tr><td colspan="2" style="padding:10px 8px 4px;font-size:11px;font-weight:900;text-transform:uppercase;color:#555">EXPENSES</td></tr>';
  (trip.expenses||[]).forEach(function(e){
    rows+='<tr><td style="padding:6px 8px;font-size:14px;color:#333">'+esc(e.desc)+'</td><td style="padding:6px 8px;text-align:right;font-weight:700;font-size:14px;color:#111">'+fmt(e.amount)+'</td></tr>';
    rows+='<tr><td colspan="2" style="padding:2px 8px;font-size:11px;color:#888">Paid by '+esc(pName(e.payerId))+' - '+(e.reviewed?'Reviewed':'Pending')+'</td></tr>';
  });
  rows+='<tr><td colspan="2"><hr style="border:none;border-top:1px dashed #ccc;margin:4px 0"/></td></tr>';
  rows+='<tr><td colspan="2" style="padding:8px;text-align:center;font-size:18px;font-weight:900">TOTAL: '+fmt(total)+'</td></tr>';
  rows+='<tr><td colspan="2"><hr style="border:none;border-top:1px dashed #ccc;margin:4px 0"/></td></tr>';
  rows+='<tr><td colspan="2" style="padding:10px 8px 4px;font-size:11px;font-weight:900;text-transform:uppercase;color:#555">BALANCES</td></tr>';
  adults.forEach(function(p){
    var b=bal[p.id]||0;
    var deps=trip.people.filter(function(x){return x.isDependent&&x.guardianId===p.id;});
    var color=b>0?'#1a7a3a':b<0?'#c0392b':'#888';
    var label=b===0?'Settled':fmt(Math.abs(b))+' '+(b>0?L.getsBack:L.owes);
    rows+='<tr><td style="padding:6px 8px;font-size:14px">'+esc(p.name)+(deps.length?' (+'+deps.map(function(d){return esc(d.name);}).join(', ')+')':'')+'</td><td style="padding:6px 8px;text-align:right;font-weight:700;color:'+color+';font-size:14px">'+label+'</td></tr>';
    if(p.upi)rows+='<tr><td colspan="2" style="padding:2px 8px;font-size:11px;color:#888">UPI: '+esc(p.upi)+'</td></tr>';
  });
  if(txns.length){
    rows+='<tr><td colspan="2"><hr style="border:none;border-top:1px dashed #ccc;margin:4px 0"/></td></tr>';
    rows+='<tr><td colspan="2" style="padding:10px 8px 4px;font-size:11px;font-weight:900;text-transform:uppercase;color:#555">SETTLE UP</td></tr>';
    txns.forEach(function(tx){
      var toP=trip.people.find(function(p){return p.id===tx.to;});
      rows+='<tr><td colspan="2" style="padding:8px;background:#f8f8f8"><b style="color:#c0392b">'+esc(pName(tx.from))+'</b> pays <b style="color:#1a7a3a">'+esc(pName(tx.to))+'</b> - <b>'+fmt(tx.amount)+'</b>'+(toP&&toP.upi?'<br/><span style="font-size:12px;color:#2980b9">UPI: '+esc(toP.upi)+'</span>':'')+'</td></tr>';
    });
  }
  var html='<!DOCTYPE html><html><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>SplitPack - '+esc(trip.name)+'</title><style>body{background:#f0f0f0;display:flex;justify-content:center;padding:20px;font-family:Courier New,monospace}.receipt{background:#fff;width:100%;max-width:380px;border-radius:8px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.15)}.hdr{background:#0b0f14;color:#4a9eff;text-align:center;padding:24px 16px}.hdr h1{font-size:28px;letter-spacing:2px;margin:0}.hdr p{color:#3a5a78;font-size:12px;margin:4px 0 0}table{width:100%;border-collapse:collapse}.ftr{text-align:center;font-size:11px;color:#aaa;padding:16px;border-top:1px dashed #ddd}</style></head><body><div class="receipt"><div class="hdr"><h1>SPLITPACK</h1><p>Official Trip Receipt</p></div><table>'+rows+'</table><div class="ftr">SplitPack - '+now+'</div></div></body></html>';
  var blob=new Blob([html],{type:'text/html'});
  window.open(URL.createObjectURL(blob),'_blank');
}
async function compress(file){
  return new Promise(function(res){
    var r=new FileReader();
    r.onload=function(e){
      var img=new Image();
      img.onload=function(){
        var SIZE=80,c=document.createElement('canvas');
        c.width=SIZE;c.height=SIZE;
        var cx=c.getContext('2d'),s=Math.min(img.width,img.height);
        cx.drawImage(img,(img.width-s)/2,(img.height-s)/2,s,s,0,0,SIZE,SIZE);
        res(c.toDataURL('image/jpeg',.7));
      };
      img.src=e.target.result;
    };
    r.readAsDataURL(file);
  });
}

var uns={};

function subTrip(id){
  if(uns[id])return;
  uns[id]=onSnapshot(tRef(id),function(snap){
    if(snap.exists()){S.trips=Object.assign({},S.trips);S.trips[id]=snap.data();render();}
  });
}
function boot(){var ids=getIds();S.myIds=ids;ids.forEach(function(id){subTrip(id);});S.loading=false;render();}
function resolveP(ids,people){
  var out=[];
  ids.forEach(function(id){
    var p=people.find(function(x){return x.id===id;});
    if(p){
      var aid=p.isDependent?p.guardianId:p.id;
      if(out.indexOf(aid)===-1)out.push(aid);
    }
  });
  return out;
}

function bindTrip(tr){

  document.querySelectorAll('.tab-btn').forEach(function(b){b.addEventListener('click',function(){setState({tab:b.dataset.tab,showExpForm:false});});});

  var edep=document.getElementById('edit-dep');if(edep)edep.addEventListener('change',function(e){setState({editingPerson:Object.assign({},S.editingPerson,{isDependent:e.target.checked})});});

  var bSE=document.getElementById('btn-show-exp');if(bSE)bSE.addEventListener('click',function(){if(people.length<2){alert(L.addMember);return;}setState({showExpForm:true,expDesc:'',expAmount:'',expPayer:'',expParticipants:[],splitMode:'equal',customShares:{}});});
  var ed=document.getElementById('exp-desc');if(ed)ed.addEventListener('input',function(e){S.expDesc=e.target.value;});

  document.querySelectorAll('.split-mode-btn').forEach(function(b){b.addEventListener('click',function(){S.splitMode=b.dataset.mode;S.customShares={};document.querySelectorAll('.split-mode-btn').forEach(function(x){x.style.background=x.dataset.mode===S.splitMode?(x.dataset.mode==='equal'?'#4a9eff':'#f0883e'):'#1e2a38';x.style.color=x.dataset.mode===S.splitMode?'#fff':'#6b8aa8';});updateCustomRows(people,adults);updateSharePreview(people);});});
  document.querySelectorAll('.chip-p').forEach(function(b){b.addEventListener('click',function(){var pid=b.dataset.pid;var idx=S.expParticipants.indexOf(pid);if(idx!==-1){S.expParticipants.splice(idx,1);delete S.customShares[pid];}else{S.expParticipants.push(pid);}b.classList.toggle('on',S.expParticipants.indexOf(pid)!==-1);updateCustomRows(people,adults);updateSharePreview(people);});});
  document.querySelectorAll('.cat-chip').forEach(function(b){b.addEventListener('click',function(){S.expDesc=b.dataset.cat;var inp=document.getElementById('exp-desc');if(inp)inp.value=S.expDesc;});});

function updateSharePreview(people){
  var preview=document.getElementById('share-preview');
  if(!preview)return;
  var amt=parseFloat(S.expAmount||0);
  if(S.splitMode==='equal'&&S.expParticipants.length>0&&amt>0){
    var cnt={};
    S.expParticipants.forEach(function(pid){var p=people.find(function(x){return x.id===pid;});if(!p)return;var aid=(p.isDependent&&p.guardianId)?p.guardianId:p.id;cnt[aid]=(cnt[aid]||0)+1;});
    var total=Object.values(cnt).reduce(function(s,n){return s+n;},0);
    var unit=total?amt/total:0;
    var lines=Object.entries(cnt).map(function(entry){var pid=entry[0],n=entry[1];var p=people.find(function(x){return x.id===pid;});return(p?p.name:'?')+': '+fmt(unit*n)+(n>1?' (x'+n+')':'');}).join(' - ');
    preview.innerHTML='<div style="font-size:11px;color:#2e4a64;margin-top:8px;font-weight:700">'+lines+'</div>';
    preview.style.display='block';
  }else{preview.style.display='none';}
}
function updateCustomRows(people,adults){
  var container=document.getElementById('custom-rows-container');
  if(!container)return;
  if(S.splitMode!=='custom'||S.expParticipants.length===0){container.innerHTML='';return;}
  var L=t();
  var resolvedIds=resolveP(S.expParticipants,people);
  var rPeople=adults.filter(function(p){return resolvedIds.indexOf(p.id)!==-1;});
  var used=rPeople.reduce(function(s,p){return s+parseFloat(S.customShares[p.id]||0);},0);
  var rem=parseFloat(S.expAmount||0)-used;
  var html='<div style="margin-top:10px;background:#0b0f14;border-radius:10px;padding:12px;border:1px solid #1e2a38"><div style="font-size:12px;color:#6b8aa8;font-weight:700;margin-bottom:8px">'+L.enterShares+'</div>';
  rPeople.forEach(function(p){html+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><div style="font-size:13px;font-weight:700;flex:1">'+esc(p.name)+'</div><div style="display:flex;align-items:center;gap:4px"><span style="color:#3a5a78;font-size:13px">Rs.</span><input class="inp custom-share-inp" data-pid="'+p.id+'" value="'+esc(S.customShares[p.id]||'')+'" type="number" placeholder="0" style="width:90px;padding:6px 10px;text-align:right"/></div></div>';});
  html+='<div style="display:flex;justify-content:space-between;font-size:12px;padding-top:8px;border-top:1px solid #1e2a38;margin-top:4px"><span style="color:#6b8aa8">'+L.remaining+'</span><span id="rem-amt" style="font-weight:800;color:'+(Math.abs(rem)<0.01?'#3fb950':rem<0?'#f85149':'#f0883e')+'">'+fmt(rem)+'</span></div></div>';
  container.innerHTML=html;
  container.querySelectorAll('.custom-share-inp').forEach(function(inp){inp.addEventListener('input',function(e){S.customShares[inp.dataset.pid]=e.target.value;var used2=rPeople.reduce(function(s,p){return s+parseFloat(S.customShares[p.id]||0);},0);var rem2=parseFloat(S.expAmount||0)-used2;var el=document.getElementById('rem-amt');if(el){el.textContent=fmt(rem2);el.style.color=Math.abs(rem2)<0.01?'#3fb950':rem2<0?'#f85149':'#f0883e';}});});
}
async function createTrip(){
  if(!S.newTripName.trim())return;
  var tr={id:uid(),name:S.newTripName.trim(),createdAt:Date.now(),ownerId:ME,people:[],expenses:[]};
  await dbSave(tr);addId(tr.id);subTrip(tr.id);
  setState({showNewTrip:false,newTripName:'',myIds:getIds()});openTrip(tr.id);
}
async function doJoin(){
  if(!S.joinCode.trim()){setState({joinError:'Enter a code'});return;}
  setState({joining:true,joinError:''});
  var tr=await dbJoin(S.joinCode);
  if(!tr){setState({joining:false,joinError:'Trip not found. Check the code.'});return;}
  addId(tr.id);subTrip(tr.id);setState({showJoin:false,joining:false,myIds:getIds()});openTrip(tr.id);
}
function openTrip(id){setState({activeTripId:id,tab:'people',showExpForm:false,newName:'',isDependent:false,guardianId:'',editingPerson:null});}
function delTrip(id){rmId(id);if(uns[id]){uns[id]();delete uns[id];}var trips=Object.assign({},S.trips);delete trips[id];setState({trips:trips,myIds:getIds(),activeTripId:S.activeTripId===id?null:S.activeTripId});}
function leaveTrip(id){rmId(id);if(uns[id]){uns[id]();delete uns[id];}var trips=Object.assign({},S.trips);delete trips[id];setState({trips:trips,myIds:getIds()});}
async function saveTripName(){if(!S.tempTripName.trim()){setState({editTripName:false});return;}var tr=getTrip();if(!tr)return;await dbSave(Object.assign({},tr,{name:S.tempTripName.trim()}));setState({editTripName:false});}
async function addPerson(){
  if(!S.newName.trim())return;
  var tr=getTrip();if(!tr)return;
  var p={id:uid(),name:S.newName.trim(),isDependent:S.isDependent,guardianId:S.isDependent?S.guardianId:'',photo:null,upi:''};
  var newPeople=tr.people.slice();newPeople.push(p);
  await dbSave(Object.assign({},tr,{people:newPeople}));
  setState({newName:'',isDependent:false,guardianId:''});

async function saveEditedPerson(){
  var tr=getTrip();if(!tr||!S.editingPerson)return;
  var name=document.getElementById('edit-name')?document.getElementById('edit-name').value.trim():'';
  var upi=document.getElementById('edit-upi')?document.getElementById('edit-upi').value.trim():'';
  var isDep=document.getElementById('edit-dep')?document.getElementById('edit-dep').checked:false;
  var guardian=document.getElementById('edit-guardian')?document.getElementById('edit-guardian').value:'';
  if(!name)return;
  var updated=Object.assign({},S.editingPerson,{name:name,upi:upi,isDependent:isDep,guardianId:isDep?guardian:''});
  await dbSave(Object.assign({},tr,{people:tr.people.map(function(p){return p.id===updated.id?updated:p;})}));
  setState({editingPerson:null});
}
async function delPerson(pid){
  var tr=getTrip();if(!tr)return;
  var newPeople=tr.people.filter(function(p){return p.id!==pid&&p.guardianId!==pid;});
  var newExpenses=tr.expenses.filter(function(e){return e.payerId!==pid;}).map(function(e){
    var nc=Object.assign({},e.customShares||{});delete nc[pid];
    return Object.assign({},e,{participants:(e.participants||[]).filter(function(id){return id!==pid;}),rawParticipants:(e.rawParticipants||[]).filter(function(id){return id!==pid;}),customShares:nc});
  });
  await dbSave(Object.assign({},tr,{people:newPeople,expenses:newExpenses}));
}
async function saveExpense(){
  var tr=getTrip();if(!tr)return;
  if(!S.expDesc.trim()||!S.expAmount||!S.expPayer||S.expParticipants.length===0){alert('Please fill all fields');return;}
  var amt=parseFloat(S.expAmount);
  var autoReviewed=ME===tr.ownerId;
  var exp;
  var rawParts=S.expParticipants.slice();
  if(S.splitMode==='custom'){
    var resolvedIds=resolveP(S.expParticipants,tr.people);
    var sharesTotal=resolvedIds.reduce(function(s,pid){return s+parseFloat(S.customShares[pid]||0);},0);
    if(Math.abs(sharesTotal-amt)>0.5){alert('Total '+fmt(sharesTotal)+' does not match '+fmt(amt));return;}
    var customShares={};resolvedIds.forEach(function(pid){customShares[pid]=parseFloat(S.customShares[pid]||0);});
    exp={id:uid(),desc:S.expDesc.trim(),amount:amt,payerId:S.expPayer,splitMode:'custom',customShares:customShares,participants:resolvedIds,rawParticipants:rawParts,addedBy:ME,reviewed:autoReviewed,createdAt:Date.now()};
  }else{
    var participants=resolveP(S.expParticipants,tr.people);
    exp={id:uid(),desc:S.expDesc.trim(),amount:amt,payerId:S.expPayer,splitMode:'equal',participants:participants,rawParticipants:rawParts,addedBy:ME,reviewed:autoReviewed,createdAt:Date.now()};
  }
  var newExp=tr.expenses.slice();newExp.push(exp);
  await dbSave(Object.assign({},tr,{expenses:newExp}));
  setState({showExpForm:false,expDesc:'',expAmount:'',expPayer:'',expParticipants:[],splitMode:'equal',customShares:{}});
}
async function delExpense(tr,eid){await dbSave(Object.assign({},tr,{expenses:tr.expenses.filter(function(e){return e.id!==eid;})}));}
async function reviewExpense(tr,eid){await dbSave(Object.assign({},tr,{expenses:tr.expenses.map(function(e){return e.id===eid?Object.assign({},e,{reviewed:true}):e;})}));}
