.btn{border:none;border-radius:10px;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:800;transition:all .15s;display:inline-flex;align-items:center;justify-content:center;gap:5px}

.btn:active{transform:scale(.97)}

.inp:focus{border-color:#4a9eff}
.inp::placeholder{color:#2e3f52}
select.inp{appearance:none}
.chip{border-radius:20px;font-size:12px;font-weight:700;padding:5px 11px;cursor:pointer;transition:all .15s;border:1.5px solid #1e2a38;background:#0b0f14;color:#4a6a88;font-family:'Nunito',sans-serif;display:inline-flex;align-items:center;gap:5px}
.chip:hover{border-color:#4a9eff;color:#dce6f0}
.chip.on{background:#4a9eff18;color:#4a9eff;border-color:#4a9eff}
.card{background:#131920;border:1px solid #1e2a38;border-radius:16px;padding:16px}
.label{color:#3a5a78;font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;display:block}
.trip-card{background:#131920;border:1px solid #1e2a38;border-radius:18px;padding:18px 16px;cursor:pointer;transition:all .22s;margin-bottom:12px}
.trip-card:hover{border-color:#4a9eff55;transform:translateY(-3px);box-shadow:0 10px 36px #4a9eff12}
@keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes pop{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
.anim-up{animation:slideUp .25s ease}
.anim-pop{animation:pop .2s ease}
.pencil-btn{background:#1e2a38;border:none;border-radius:8px;color:#6b8aa8;cursor:pointer;padding:5px 9px;font-size:13px;transition:all .15s;font-family:'Nunito',sans-serif;font-weight:800}

.lang-btn{border:1.5px solid #1e2a38;border-radius:10px;padding:7px 14px;font-size:13px;font-weight:800;cursor:pointer;transition:all .15s;background:#0b0f14;color:#4a6a88;font-family:'Nunito',sans-serif}

const tRef=id=>doc(db,'trips',id);
const cRef=c=>doc(db,'codes',c.toLowerCase());

async function dbSave(trip){
  await setDoc(tRef(trip.id),trip);
  await setDoc(cRef(sc(trip.id)),{tripId:trip.id});
}
async function dbJoin(code){
  const s=await getDoc(cRef(code.trim().toLowerCase()));
  if(!s.exists())return null;
  const ts=await getDoc(tRef(s.data().tripId));
  return ts.exists()?ts.data():null;
}

// ── Share count: counts shares per adult, routing dependents to guardian ──
function shareCount(e,people){
  const raw=e.rawParticipants&&e.rawParticipants.length>0?e.rawParticipants:e.participants||[];
  const cnt={};
  raw.forEach(pid=>{
    const p=people.find(x=>x.id===pid);
    if(!p){cnt[pid]=(cnt[pid]||0)+1;return;}
    const aid=p.isDependent&&p.guardianId?p.guardianId:p.id;
    cnt[aid]=(cnt[aid]||0)+1;
  });
  return cnt;
}

// ── Get one adult's share from one expense ────────────────────────────────
function adultShare(e,adultId,people){
  if(e.splitMode==='custom')return e.customShares?.[adultId]||0;
  const cnt=shareCount(e,people);
  const total=Object.values(cnt).reduce((s,n)=>s+n,0);
  if(!total)return 0;
  return(e.amount/total)*(cnt[adultId]||0);
}

// ── Settle up ─────────────────────────────────────────────────────────────
function settle(adults,expenses,people){
  const bal={};
  adults.forEach(p=>bal[p.id]=0);
  expenses.forEach(e=>{
    bal[e.payerId]=(bal[e.payerId]||0)+e.amount;
    adults.forEach(p=>{bal[p.id]=(bal[p.id]||0)-adultShare(e,p.id,people);});
  });
  const pos=[],neg=[];
  Object.entries(bal).forEach(([id,a])=>{
    if(a>0.005)pos.push({id,a});else if(a<-0.005)neg.push({id,a:-a});
  });
  const txns=[];let i=0,j=0;
  while(i<pos.length&&j<neg.length){
    const s=Math.min(pos[i].a,neg[j].a);
    txns.push({from:neg[j].id,to:pos[i].id,amount:s});
    pos[i].a-=s;neg[j].a-=s;
    if(pos[i].a<0.005)i++;if(neg[j].a<0.005)j++;
  }
  return{bal,txns};
}

// ── Export receipt ────────────────────────────────────────────────────────
function exportReceipt(trip){
  const L=t();
  const adults=trip.people.filter(p=>!p.isDependent);
  const {bal,txns}=settle(adults,trip.expenses||[],trip.people);
  const total=(trip.expenses||[]).reduce((s,e)=>s+e.amount,0);
  const pName=id=>(trip.people.find(p=>p.id===id)||{}).name||'?';
  const date=new Date(trip.createdAt).toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'});
  const now=new Date().toLocaleString('en-IN',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});

  const row=(l,r,sm)=>`<tr><td style="padding:6px 8px;font-size:${sm?12:14}px;color:${sm?'#888':'#333'}">${l}</td><td style="padding:6px 8px;text-align:right;font-weight:700;font-size:${sm?12:14}px;color:${sm?'#888':'#111'}">${r}</td></tr>`;
  const div=`<tr><td colspan="2"><hr style="border:none;border-top:1px dashed #ccc;margin:4px 0"/></td></tr>`;
  const sec=l=>`<tr><td colspan="2" style="padding:10px 8px 4px;font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:1px;color:#555">${l}</td></tr>`;

  let rows='';
  rows+=row('Trip',`<b>${esc(trip.name)}</b>`);
  rows+=row('Date',date);
  rows+=row('Code',`<b style="letter-spacing:2px">${sc(trip.id)}</b>`);
  rows+=row('Members',`${trip.people.length} (${adults.length} ${L.paying})`);
  rows+=div;
  rows+=sec('💸 '+L.expenses);
  (trip.expenses||[]).forEach(e=>{
    rows+=row(`${ee(e.desc)} ${esc(e.desc)}`,fmt(e.amount));
    rows+=row(`&nbsp;&nbsp;${L.paidBy} ${esc(pName(e.payerId))} · ${e.reviewed?'✅':'⏳'}`,e.splitMode==='custom'?L.customSplit:L.equalSplitLabel,true);
    if(e.splitMode==='custom')
      Object.entries(e.customShares||{}).forEach(([pid,amt])=>rows+=row(`&nbsp;&nbsp;&nbsp;${esc(pName(pid))}`,fmt(amt),true));
  });
  rows+=div;
  rows+=`<tr><td colspan="2" style="padding:8px;text-align:center;font-size:18px;font-weight:900">${L.total}: ${fmt(total)}</td></tr>`;
  rows+=div;
  rows+=sec('👥 '+L.balanceSummary);
  adults.forEach(p=>{
    const b=bal[p.id]||0;
    const deps=trip.people.filter(x=>x.isDependent&&x.guardianId===p.id);
    const color=b>0?'#1a7a3a':b<0?'#c0392b':'#888';
    rows+=`<tr><td style="padding:6px 8px;font-size:14px">${esc(p.name)}${deps.length?` <span style="color:#e67e22;font-size:11px">(+${deps.map(d=>esc(d.name)).join(', ')})</span>`:''}</td><td style="padding:6px 8px;text-align:right;font-weight:700;color:${color};font-size:14px">${b===0?'✅':fmt(Math.abs(b))+' '+(b>0?L.getsBack:L.owes)}</td></tr>`;
    if(p.upi)rows+=row(`&nbsp;&nbsp;💳 ${esc(p.upi)}`,'',true);
  });
  if(txns.length){

// ── Image compress ────────────────────────────────────────────────────────
async function compress(file){
return new Promise(res=>{
const r=new FileReader();
r.onload=e=>{
const img=new Image();
img.onload=()=>{
const S=80,c=document.createElement(‘canvas’);
c.width=S;c.height=S;
const cx=c.getContext(‘2d’),s=Math.min(img.width,img.height);
cx.drawImage(img,(img.width-s)/2,(img.height-s)/2,s,s,0,0,S,S);
res(c.toDataURL(‘image/jpeg’,.7));
};
img.src=e.target.result;
};
r.readAsDataURL(file);
});
}

// ── UI helpers for expense form ───────────────────────────────────────────
function updateSharePreview(people){
const preview=document.getElementById(‘share-preview’);
if(!preview)return;
const amt=parseFloat(S.expAmount||0);
if(S.splitMode===‘equal’&&S.expParticipants.length>0&&amt>0){
const cnt={};
S.expParticipants.forEach(pid=>{
const p=people.find(x=>x.id===pid);if(!p)return;
const aid=p.isDependent&&p.guardianId?p.guardianId:p.id;
cnt[aid]=(cnt[aid]||0)+1;
});
const total=Object.values(cnt).reduce((s,n)=>s+n,0);
const unit=total?amt/total:0;
const lines=Object.entries(cnt).map(([pid,n])=>{
const p=people.find(x=>x.id===pid);
return`${p?p.name:'?'}: ${fmt(unit*n)}${n>1?` (×${n})`:''}`;
}).join(’ · ’);
preview.innerHTML=`<div style="font-size:11px;color:#2e4a64;margin-top:8px;font-weight:700">${lines}</div>`;
preview.style.display=‘block’;
}else{preview.style.display=‘none’;}
}

function updateCustomRows(people,adults){
const container=document.getElementById(‘custom-rows-container’);
if(!container)return;
if(S.splitMode!==‘custom’||S.expParticipants.length===0){container.innerHTML=’’;return;}
const L=t();
const resolvedIds=resolveP(S.expParticipants,people);
const rPeople=adults.filter(p=>resolvedIds.includes(p.id));
const used=rPeople.reduce((s,p)=>s+parseFloat(S.customShares[p.id]||0),0);
const rem=parseFloat(S.expAmount||0)-used;
container.innerHTML=`<div style="margin-top:10px;background:#0b0f14;border-radius:10px;padding:12px;border:1px solid #1e2a38"> <div style="font-size:12px;color:#6b8aa8;font-weight:700;margin-bottom:8px">${L.enterShares}</div> ${rPeople.map(p=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
<div style="font-size:13px;font-weight:700;flex:1">${esc(p.name)}</div>
<div style="display:flex;align-items:center;gap:4px"><span style="color:#3a5a78;font-size:13px">₹</span>
<input class="inp custom-share-inp" data-pid="${p.id}" value="${esc(S.customShares[p.id]||'')}" type="number" placeholder="0" style="width:90px;padding:6px 10px;text-align:right"/></div>
</div>`).join(’’)}
<div style="display:flex;justify-content:space-between;font-size:12px;padding-top:8px;border-top:1px solid #1e2a38;margin-top:4px">
<span style="color:#6b8aa8">${L.remaining}</span>
<span id="rem-amt" style="font-weight:800;color:${Math.abs(rem)<0.01?'#3fb950':rem<0?'#f85149':'#f0883e'}">${fmt(rem)}</span>
</div>

  </div>`;
  container.querySelectorAll('.custom-share-inp').forEach(inp=>inp.addEventListener('input',e=>{
    S.customShares=Object.assign({},S.customShares,{[inp.dataset.pid]:e.target.value});
    const used2=rPeople.reduce((s,p)=>s+parseFloat(S.customShares[p.id]||0),0);

    if(el){el.textContent=fmt(rem2);el.style.color=Math.abs(rem2)<0.01?'#3fb950':rem2<0?'#f85149':'#f0883e';}
  }));
}

// ── ACTIONS ───────────────────────────────────────────────────────────────
async function createTrip(){
if(!S.newTripName.trim())return;
const tr={id:uid(),name:S.newTripName.trim(),createdAt:Date.now(),ownerId:ME,people:[],expenses:[]};
await dbSave(tr);addId(tr.id);subTrip(tr.id);
set({showNewTrip:false,newTripName:’’,myIds:getIds()});openTrip(tr.id);
}

async function doJoin(){
if(!S.joinCode.trim()){set({joinError:‘Enter a code’});return;}
set({joining:true,joinError:’’});
const tr=await dbJoin(S.joinCode);
if(!tr){set({joining:false,joinError:‘Trip not found. Check the code.’});return;}
addId(tr.id);subTrip(tr.id);set({showJoin:false,joining:false,myIds:getIds()});openTrip(tr.id);
}

function openTrip(id){set({activeTripId:id,tab:‘people’,showExpForm:false,newName:’’,isDependent:false,guardianId:’’,editingPerson:null});}

function delTrip(id){
rmId(id);if(uns[id]){uns[id]();delete uns[id];}
const trips=Object.assign({},S.trips);delete trips[id];
set({trips,myIds:getIds(),activeTripId:S.activeTripId===id?null:S.activeTripId});
}
function leaveTrip(id){rmId(id);if(uns[id]){uns[id]();delete uns[id];}const trips=Object.assign({},S.trips);delete trips[id];set({trips,myIds:getIds()});}

async function saveTripName(){
if(!S.tempTripName.trim()){set({editTripName:false});return;}
const tr=trip();if(!tr)return;
await dbSave(Object.assign({},tr,{name:S.tempTripName.trim()}));set({editTripName:false});
}

async function addPerson(){
if(!S.newName.trim())return;

const p={id:uid(),name:S.newName.trim(),isDependent:S.isDependent,guardianId:S.isDependent?S.guardianId:’’,photo:null,upi:’’};
await dbSave(Object.assign({},tr,{people:[…tr.people,p]}));
set({newName:’’,isDependent:false,guardianId:’’});

async function saveEditedPerson(){

const name=document.getElementById(‘edit-name’)?.value?.trim();
const upi=document.getElementById(‘edit-upi’)?.value?.trim()||’’;
const isDep=document.getElementById(‘edit-dep’)?.checked||false;

}

async function delPerson(pid){

people:tr.people.filter(p=>p.id!==pid&&p.guardianId!==pid),
expenses:tr.expenses.filter(e=>e.payerId!==pid).map(e=>Object.assign({},e,{

async function saveExpense(){
const tr=trip();if(!tr)return;
if(!S.expDesc.trim()||!S.expAmount||!S.expPayer||S.expParticipants.length===0){alert(‘Please fill all fields’);return;}
const amt=parseFloat(S.expAmount);
const autoReviewed=ME===tr.ownerId;
let exp;
if(S.splitMode===‘custom’){
const resolvedIds=resolveP(S.expParticipants,tr.people);
const sharesTotal=resolvedIds.reduce((s,pid)=>s+parseFloat(S.customShares[pid]||0),0);
if(Math.abs(sharesTotal-amt)>0.5){alert(`Total ${fmt(sharesTotal)} ≠ ${fmt(amt)}`);return;}
const customShares={};resolvedIds.forEach(pid=>{customShares[pid]=parseFloat(S.customShares[pid]||0);});
exp={id:uid(),desc:S.expDesc.trim(),amount:amt,payerId:S.expPayer,splitMode:‘custom’,customShares,participants:resolvedIds,rawParticipants:[…S.expParticipants],addedBy:ME,reviewed:autoReviewed,createdAt:Date.now()};
}else{
const participants=resolveP(S.expParticipants,tr.people);
exp={id:uid(),desc:S.expDesc.trim(),amount:amt,payerId:S.expPayer,splitMode:‘equal’,participants,rawParticipants:[…S.expParticipants],addedBy:ME,reviewed:autoReviewed,createdAt:Date.now()};
}
await dbSave(Object.assign({},tr,{expenses:[…tr.expenses,exp]}));
set({showExpForm:false,expDesc:’’,expAmount:’’,expPayer:’’,expParticipants:[],splitMode:‘equal’,customShares:{}});
}

async function delExpense(tr,eid){await dbSave(Object.assign({},tr,{expenses:tr.expenses.filter(e=>e.id!==eid)}));}
async function reviewExpense(tr,eid){await dbSave(Object.assign({},tr,{expenses:tr.expenses.map(e=>e.id===eid?Object.assign({},e,{reviewed:true}):e)}));}

boot();
</script>

<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}</script>
