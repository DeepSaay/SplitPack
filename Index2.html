<script type="module">

var app=initializeApp({apiKey:"AIzaSyDMN8q8zQm76B68wJShpc1BafU7rCWLpuE",authDomain:"splitpack-7c1a4.firebaseapp.com",projectId:"splitpack-7c1a4",storageBucket:"splitpack-7c1a4.firebasestorage.app",messagingSenderId:"189484190941",appId:"1:189484190941:web:704c5cac39e91052ec9f34"});
var db=getFirestore(app);

// ── Helpers ────────────────────────────────────────────────────────────────
var AVATARS=[‘🧑’,‘👩’,‘🧔’,‘👱’,‘🙋’,‘🧕’,‘👦’,‘👧’,‘🧒’,‘👩‍🦰’,‘🧑‍🦳’,‘👨‍🦲’,‘🥷’,‘🧑‍🎤’,‘👨’,‘👩‍🦱’];
var EMOJIS=[‘🍦’,‘🍕’,‘🍔’,‘⛽’,‘🏨’,‘🎢’,‘🛶’,‘☕’,‘🎟’,‘🛒’,‘🍺’,‘🚕’,‘🎡’,‘🏖’,‘🍣’,‘🥗’,‘🎠’,‘🚢’,‘🧴’,‘🎑’];
function uid(){return Math.random().toString(36).slice(2,9);}
function fmt(n){return ‘Rs.’+Number(n).toFixed(2);}
function esc(s){return String(s||’’).replace(/&/g,’&’).replace(/</g,’<’).replace(/>/g,’>’).replace(/”/g,’"’);}
function av(n){return AVATARS[(n?n.charCodeAt(0):0)%AVATARS.length];}
function ee(d){return EMOJIS[(d?d.charCodeAt(0):0)%EMOJIS.length];}
function sc(id){return id.slice(0,6).toUpperCase();}

// ── Firebase ───────────────────────────────────────────────────────────────
function tRef(id){return doc(db,‘trips’,id);}
function cRef(c){return doc(db,‘codes’,c.toLowerCase());}
async function dbSave(trip){await setDoc(tRef(trip.id),trip);await setDoc(cRef(sc(trip.id)),{tripId:trip.id});}
async function dbJoin(code){
var s=await getDoc(cRef(code.trim().toLowerCase()));
if(!s.exists())return null;
var ts=await getDoc(tRef(s.data().tripId));
return ts.exists()?ts.data():null;
}
var myIds=[];
function getIds(){try{return JSON.parse(localStorage.getItem(‘sp_ids’))||[];}catch(e){return[];}}
function saveIds(ids){localStorage.setItem(‘sp_ids’,JSON.stringify(ids));}
function addId(id){var ids=getIds();if(ids.indexOf(id)===-1){ids.unshift(id);saveIds(ids);}}
function rmId(id){saveIds(getIds().filter(function(x){return x!==id;}));}

// ── Share calculation ──────────────────────────────────────────────────────
// Each person (adult or dependent) = 1 share
// Dependent shares roll up to their guardian
function shareCount(e,people){
var raw=(e.rawParticipants&&e.rawParticipants.length>0)?e.rawParticipants:(e.participants||[]);
var cnt={};
raw.forEach(function(pid){
var p=people.find(function(x){return x.id===pid;});
if(!p){cnt[pid]=(cnt[pid]||0)+1;return;}
var aid=(p.isDependent&&p.guardianId)?p.guardianId:p.id;
cnt[aid]=(cnt[aid]||0)+1;
});
return cnt;
}

// Share for one adult (includes their dependents)
function adultShare(e,adultId,people){
if(e.splitMode===‘custom’)return(e.customShares&&e.customShares[adultId])||0;
var cnt=shareCount(e,people);
var total=Object.values(cnt).reduce(function(s,n){return s+n;},0);
if(!total)return 0;
return(e.amount/total)*(cnt[adultId]||0);
}

// Share for ONE individual person (1 unit, not including their dependents)
function personShare(e,personId,people){
if(e.splitMode===‘custom’){
// In custom mode, we don’t track per-dependent amounts
// For the guardian: return their full customShares amount
// For a dependent: return 0 (their cost is inside guardian’s customShares)
var person=people.find(function(x){return x.id===personId;});
if(!person)return 0;
if(person.isDependent)return 0;
return(e.customShares&&e.customShares[personId])||0;
}
// Equal: check if this person is in rawParticipants
var raw=(e.rawParticipants&&e.rawParticipants.length>0)?e.rawParticipants:(e.participants||[]);
if(raw.indexOf(personId)===-1)return 0;
var cnt=shareCount(e,people);
var total=Object.values(cnt).reduce(function(s,n){return s+n;},0);
if(!total)return 0;
// Each individual = 1 unit
return e.amount/total;
}

// ── Settle ─────────────────────────────────────────────────────────────────
function settle(adults,expenses,people){
var bal={};
adults.forEach(function(p){bal[p.id]=0;});
expenses.forEach(function(e){
bal[e.payerId]=(bal[e.payerId]||0)+e.amount;
adults.forEach(function(p){bal[p.id]=(bal[p.id]||0)-adultShare(e,p.id,people);});
});
var pos=[],neg=[];
Object.entries(bal).forEach(function(entry){
var id=entry[0],a=entry[1];
if(a>0.005)pos.push({id:id,a:a});
else if(a<-0.005)neg.push({id:id,a:-a});
});
var txns=[],i=0,j=0;
while(i<pos.length&&j<neg.length){
var s=Math.min(pos[i].a,neg[j].a);
txns.push({from:neg[j].id,to:pos[i].id,amount:s});
pos[i].a-=s;neg[j].a-=s;
if(pos[i].a<0.005)i++;
if(neg[j].a<0.005)j++;
}
return{bal:bal,txns:txns};
}

// ── State ──────────────────────────────────────────────────────────────────
var trips={};
var uns={};
var activeId=null;
var tab=‘settle’;

function subTrip(id){
if(uns[id])return;
uns[id]=onSnapshot(tRef(id),function(snap){
if(snap.exists()){trips[id]=snap.data();render();}
});
}

function boot(){
var ids=getIds();
myIds=ids;
ids.forEach(function(id){subTrip(id);});
render();
}

var tr=trips[activeId];
if(!tr){activeId=null;render();return;}
el.innerHTML=renderTrip(tr);bindTrip(tr);
}

html+=’</div></div>’;
